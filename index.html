<!DOCTYPE html>
<!-- Version: 1.0.2 - Stabilization Mode -->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Bloom Studio Nails | Sofisticação e delicadeza em cada detalhe</title>
    <meta name="description" content="Bloom Studio Nails — Unhas sofisticadas, delicadas e modernas em Manaus. Especialistas em alongamento em gel, nail art e cuidados premium.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/intro.css">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bloom: {
                            offWhite: '#FAF8F5',
                            lilac: '#B8A4D4',
                            purple: '#7E689F',
                            nude: '#E8DDD7',
                            graphite: '#2D2D2D',
                            gray: '#D9D4DD'
                        }
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Poppins', 'sans-serif']
                    },
                    borderRadius: { 
                        'bloom': '24px'
                    },
                    boxShadow: { 
                        'bloom': '0 8px 30px rgba(0,0,0,0.06)'
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }
        body { 
            background-color: #FAF8F5; 
            color: #2D2D2D; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden;
            margin: 0;
        }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .btn-primary {
            @apply bg-bloom-purple text-white px-10 py-5 rounded-bloom font-bold uppercase tracking-widest text-xs transition-all duration-300 hover:scale-105 hover:shadow-lg active:scale-95;
        }
        .btn-secondary {
            @apply border-2 border-bloom-purple text-bloom-purple px-10 py-5 rounded-bloom font-bold uppercase tracking-widest text-xs transition-all duration-300 hover:bg-bloom-purple/5 hover:scale-105 active:scale-95;
        }
        .bloom-card {
            @apply bg-white rounded-bloom shadow-bloom transition-all duration-300 hover:-translate-y-2 hover:shadow-xl;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "htm": "https://esm.sh/htm"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <!-- React Modular Loading -->
    <script type="module">
        import React from 'react';
        import ReactDOM from 'react-dom/client';
        import './app.js';
    </script>
</body>
</html>
